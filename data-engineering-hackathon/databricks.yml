bundle:
  name: translink_data_eng_hackathon

variables:
  catalog:
    description: Unity Catalog catalog name
  schema:
    description: Schema name
    default: traffic_hackathon_de
  volume:
    description: Volume name for data files
    default: traffic_data
  warehouse_id:
    description: SQL warehouse ID (for metric views job)

workspace:
  root_path: /Workspace/Shared/.bundle/${workspace.current_user.short_name}/${bundle.name}

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production
