resources:
  jobs:
    traffic_workflow:
      name: "TransLink Traffic Pipeline Workflow"
      environments:
        - environment_key: default
          spec:
            client: "2"
      tasks:
        # Task 1: Download GTFS data directly into the volume
        - task_key: acquire_gtfs_data
          notebook_task:
            notebook_path: ../src/notebooks/acquire_gtfs_data.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              volume: "${var.volume}"
          environment_key: default

        # Task 2: Generate route corridors from GTFS shapes
        - task_key: generate_corridors
          depends_on:
            - task_key: acquire_gtfs_data
          notebook_task:
            notebook_path: ../src/notebooks/generate_corridors.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              volume: "${var.volume}"
          environment_key: default

        # Task 3: Poll the Google Routes API for live traffic data
        - task_key: poll_routes_api
          depends_on:
            - task_key: generate_corridors
          notebook_task:
            notebook_path: ../src/notebooks/poll_routes_api.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              volume: "${var.volume}"
          environment_key: default

        # Task 4: Run the SDP pipeline (bronze → silver → gold)
        - task_key: run_pipeline
          depends_on:
            - task_key: poll_routes_api
          pipeline_task:
            pipeline_id: ${resources.pipelines.traffic_pipeline.id}
            full_refresh: false

        # Task 5: Apply comments and tags
        - task_key: apply_constraints
          depends_on:
            - task_key: run_pipeline
          notebook_task:
            notebook_path: ../src/pipeline/constraints_and_tags.sql
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
          environment_key: default

        # Task 6: Deploy metric views
        - task_key: deploy_metric_views
          depends_on:
            - task_key: run_pipeline
          notebook_task:
            notebook_path: ../src/metric_views/deploy_metric_views.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
          environment_key: default

      # Schedule: every 15 minutes during business hours (for demo)
      # Uncomment to enable scheduled polling:
      # schedule:
      #   quartz_cron_expression: "0 0/15 6-22 ? * MON-FRI"
      #   timezone_id: America/Vancouver
